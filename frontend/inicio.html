<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="shortcut icon" href="../static/img/logo.ico" type="image/x-icon" />
  <link rel="stylesheet" href="../static/diseños/inicio.css" />
  <title>INICIO</title>
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="../static/img/logo.png" alt="Logo" />
    </div>
    <h1 class="titulo">PORTAL DE CLASIFICACIÓN</h1>
  </header>

  <main class="contenido">
    <h2>SUBE TU ARCHIVO A CLASIFICAR</h2>
    <p>Aquí puedes subir un archivo .csv</p>

    <div class="upload-box" id="uploadBox" onclick="fileInput.click()">
      <input type="file" id="fileInput" accept=".csv" hidden />
      <div class="upload-content">
        <div class="icon">⬆️</div>
        <p>Arrastra tu archivo aquí o haz clic para seleccionarlo</p>
        <small>Formatos permitidos: .csv</small>
      </div>
    </div>

    <div id="fileInfo" style="text-align:center;"></div>

    <button id="sendBtn" disabled>📤 Enviar archivo</button>
    <a href="/graficas" id="btnGraficas">📊 Ver gráficas</a>
  </main>

  <script src="/static/funciones/inicio.js"></script>
</body>
</html>
